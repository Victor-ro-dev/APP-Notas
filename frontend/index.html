<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>📝 Minhas Notas</h1>
      </header>

      <!-- Formulário de criar / editar -->
      <section class="form-section">
        <h2 id="form-title">Nova Nota</h2>
        <form id="note-form">
          <input type="hidden" id="note-id" />
          <div class="field">
            <label for="note-title">Título</label>
            <input
              type="text"
              id="note-title"
              placeholder="Título da nota..."
              required
              maxlength="120"
            />
          </div>
          <div class="field">
            <label for="note-content">Conteúdo</label>
            <textarea
              id="note-content"
              placeholder="Escreva o conteúdo da nota..."
              rows="5"
              required
            ></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" id="submit-btn">Salvar</button>
            <button type="button" id="cancel-btn" class="secondary hidden">
              Cancelar
            </button>
          </div>
        </form>
        <p id="form-error" class="error hidden"></p>
      </section>

      <!-- Lista de notas -->
      <section class="notes-section">
        <h2>Notas salvas <span id="notes-count" class="badge">0</span></h2>
        <p id="empty-msg" class="empty-msg">Nenhuma nota cadastrada ainda.</p>
        <ul id="notes-list"></ul>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
